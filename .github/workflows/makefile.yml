name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies 
      run: | 
        sudo apt-get update
        sudo apt-get install -y make
      
    - name: Start Docker 
      run: sudo systemctl start docker 
      
    - name: Build PHP for Android 
      run: make 

    - name: Copy build output
      run: |
        mkdir -p build
        docker cp $(docker ps -alq):/workspace/build ./build || true

    - name: Show build files
      run: ls -R build
  
    - name: Upload built libraries 
      uses: actions/upload-artifact@v4 
      with: 
        name: build
        path: .
