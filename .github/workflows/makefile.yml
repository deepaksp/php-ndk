name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:      
      - uses: actions/checkout@v4
    
      - name: Build PHP Android libraries
        run: make
    
      - name: Show generated files
        run: ls -R
    
      - name: Commit libraries
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
    
          git add *
          git commit -m "Auto build PHP NDK libraries" || echo "Nothing to commit"
          git push
