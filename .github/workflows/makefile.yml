name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:      

        - uses: actions/checkout@v4
    
        - name: Build docker images
          run: make
    
        - name: Extract libraries
          run: make install DESTDIR=build
    
        - name: Upload artifacts
          uses: actions/upload-artifact@v4
          with:
            name: php-android
            path: build/
